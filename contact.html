<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Engku Syahmi</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Navigation -->
    <header>
        <div class="nav-container">
            <h1 class="logo">Engku Syahmi</h1>
            <nav>
                <a href="index.html">Home</a>
                <a href="about.html">About Me</a>
                <a href="blog.html">DevBlog</a>
                <a href="contact.html" class="active">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Contact Form Section -->
    <main style="max-width: 600px; margin: 4rem auto; background: white; padding: 2.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; margin-bottom: 1.5rem; color: #0f172a;">Let's Collaborate!</h2>
        <p style="text-align: center; color: #64748b; margin-bottom: 2rem;">Have a project in mind or want to discuss internship opportunities? Drop a message below.</p>

        <form action="#" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
            <div>
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">Your Name:</label>
                <input type="text" name="name" required style="width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">Your Email:</label>
                <input type="email" name="email" required style="width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">Message:</label>
                <textarea name="message" rows="5" required style="width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 4px; resize: none;"></textarea>
            </div>
            <button type="submit" style="background: #1e293b; color: white; border: none; padding: 0.75rem; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 1rem;">Send Message</button>
        </form>
    </main>

    <footer>
        <p>Copyright &copy; 2026 | Designed & Developed By EngkuSyahmi</p>
    </footer>

</body>
</html>
